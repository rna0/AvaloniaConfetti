name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
          - os: ubuntu-latest
            rid: linux-x64
          - os: macos-latest
            rid: osx-x64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Publish
        run: >
          dotnet publish AvaloniaConfetti/AvaloniaConfetti.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=true
          -p:TrimMode=partial
          -p:EnableCompressionInSingleFile=true
          -o publish/${{ matrix.rid }}

      - name: Archive (Windows)
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath AvaloniaConfetti-${{ matrix.rid }}.zip

      - name: Create macOS .app bundle
        if: startsWith(matrix.rid, 'osx')
        run: |
          APP="AvaloniaConfetti.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp -a publish/${{ matrix.rid }}/* "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/AvaloniaConfetti"
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>AvaloniaConfetti</string>
            <key>CFBundleDisplayName</key>
            <string>AvaloniaConfetti</string>
            <key>CFBundleIdentifier</key>
            <string>com.avaloniaconfetti.app</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleExecutable</key>
            <string>AvaloniaConfetti</string>
            <key>LSUIElement</key>
            <true/>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          tar -czf AvaloniaConfetti-${{ matrix.rid }}.tar.gz "$APP"

      - name: Archive (Linux)
        if: matrix.rid == 'linux-x64'
        run: |
          cd publish/${{ matrix.rid }}
          chmod +x AvaloniaConfetti || true
          tar -czf ../../AvaloniaConfetti-${{ matrix.rid }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: AvaloniaConfetti-${{ matrix.rid }}
          path: AvaloniaConfetti-${{ matrix.rid }}.*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*